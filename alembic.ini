# Alembic configuration for MultiLLM (D-05).
#
# script_location points at the in-package migrations directory so
# `alembic ...` and `multillm migrate ...` share the same revision history.
#
# sqlalchemy.url is set programmatically by env.py from MULTILLM_DB_PATH /
# MULTILLM_HOME, so the static value here is only a placeholder.

[alembic]
script_location = multillm/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8
sqlalchemy.url = sqlite:///./multillm.db
