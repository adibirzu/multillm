# Quickstart: cp .env.example .env && docker compose up
#
# Verify:       curl http://localhost:8080/health  # within ~20-30s of `up`
# Setup wizard: open http://localhost:8080/setup
# Dashboard:    open http://localhost:8080/dashboard  (post-setup)
#
# This is intentionally a single-service compose. SQLite is the only storage
# at v1.0 — no Redis, no Postgres.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: multillm:local
    # Cross-platform note: the dev machine may be Apple Silicon (arm64). The
    # release-built image is linux/amd64. `docker compose build` from this
    # file will produce a host-native image; for arm64 dev that is fine.
    ports:
      - "127.0.0.1:8080:8080"
    # Copy .env.example to .env first. The gateway starts with empty backend
    # credentials — at least one backend must be configured before /v1/messages
    # returns 200 (otherwise it returns 503 with a helpful error per D-15).
    env_file:
      - .env
    # Default to a project-local .multillm directory so a fresh-machine
    # `docker compose up` does NOT require the user to pre-create ~/.multillm.
    # Override by exporting MULTILLM_HOME before invoking compose.
    volumes:
      - "${MULTILLM_HOME:-./.multillm}:/data"
    # Mirrors the Dockerfile HEALTHCHECK. Setting it in both places is
    # intentional: operators reading docker-compose.yml see the contract
    # without having to crack open the Dockerfile.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
