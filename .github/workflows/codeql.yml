# MultiLLM Gateway — CodeQL static analysis.
#
# Runs on:
#   - pull_request touching Python source, tests, or pyproject.toml
#   - push to main
#   - weekly schedule (Monday 04:17 UTC — off-peak, off-the-hour to avoid
#     thundering-herd with other Monday-morning scheduled jobs)
#
# All github/codeql-action steps are pinned by 40-char commit SHA per
# OSS-13. 78ed0c7291d93e40c51b085850dc669a4c3ab73b placeholders are resolved by Plan 9 Task 1.

name: codeql

on:
  pull_request:
    paths:
      - "multillm/**"
      - "tests/**"
      - "pyproject.toml"
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # github/codeql-action v3 — pinned per OSS-13.
      # action v3
      # pinned per OSS-13
      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          languages: ${{ matrix.language }}

      # action v3
      # pinned per OSS-13
      - name: Autobuild
        uses: github/codeql-action/autobuild@78ed0c7291d93e40c51b085850dc669a4c3ab73b

      # action v3
      # pinned per OSS-13
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          category: "/language:${{ matrix.language }}"
